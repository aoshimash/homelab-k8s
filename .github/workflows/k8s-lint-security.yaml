name: K8s Lint & Security

on:
  pull_request:
    paths:
      - "k8s/**"
      - "Taskfile.yaml"
      - ".github/workflows/k8s-lint-security.yaml"
      - "trivy.yaml"
      - "trivy-secret.yaml"
      - "aqua.yaml"

jobs:
  check:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install aqua
        uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.45.1

      - name: Install tools
        run: aqua install

      - name: Run checks
        run: task check
