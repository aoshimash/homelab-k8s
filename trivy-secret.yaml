# Trivy secret scanning configuration
# See: https://aquasecurity.github.io/trivy/latest/docs/scanner/secret/

# Allow rules: exclude SOPS-encrypted files from secret scanning
# These files are encrypted and should not trigger false positives
allow-rules:
  - id: skip-sops-encrypted-files
    description: Skip SOPS-encrypted files (.sops.yaml)
    path: .*\.sops\.yaml$

# Disable specific rules that may cause false positives
# Customize based on your needs
disable-rules:
  # Disable generic rules that may trigger on encrypted data patterns
  # Keep specific rules enabled for actual secret detection
