version: '3'

vars:
  K8S_DIR: k8s
  # CRDs that don't have official Kubernetes schemas
  SKIP_KINDS: HelmRelease,HelmRepository,Kustomization,GitRepository,CiliumNetworkPolicy

tasks:
  lint:
    desc: Validate K8s manifests using kubeconform
    cmds:
      - |
        kubeconform \
          -summary \
          -skip {{.SKIP_KINDS}} \
          -output text \
          {{.K8S_DIR}}/**/*.yaml

  security:
    desc: Run Trivy security scan on K8s manifests (misconfig + secrets)
    cmds:
      - |
        trivy config \
          --config trivy.yaml \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          --skip-files flux/flux-system/gotk-components.yaml \
          --skip-dirs apps/radigo/recording/programs \
          --skip-dirs apps/radigo/metadata/programs \
          {{.K8S_DIR}}/
      - |
        trivy fs \
          --config trivy.yaml \
          --scanners secret \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          --skip-files flux/flux-system/gotk-components.yaml \
          {{.K8S_DIR}}/

  security:all:
    desc: Run Trivy security scan showing all severities (informational)
    cmds:
      - |
        trivy config \
          --exit-code 0 \
          {{.K8S_DIR}}/
      - |
        trivy fs \
          --config trivy.yaml \
          --scanners secret \
          --exit-code 0 \
          {{.K8S_DIR}}/

  check:
    desc: Run all checks (lint + security)
    cmds:
      - task: lint
      - task: security

  radigo:update-metadata:
    desc: Update podcast episode metadata from filenames
    vars:
      PROGRAM: '{{.PROGRAM | default ""}}'
      TIMESTAMP:
        sh: date +%s
    cmds:
      - |
        if [ -z "{{.PROGRAM}}" ]; then
          echo "Error: PROGRAM is required. Usage: task radigo:update-metadata PROGRAM=audrey"
          echo "Available programs: audrey, ijuin"
          exit 1
        fi
        kubectl create job radigo-metadata-{{.PROGRAM}}-{{.TIMESTAMP}} \
          --from=cronjob/{{.PROGRAM}}-radigo-metadata \
          -n audiobookshelf
        echo "Job created: radigo-metadata-{{.PROGRAM}}-{{.TIMESTAMP}}"
        echo "Check status: kubectl get jobs -n audiobookshelf -l program={{.PROGRAM}}"
        echo "View logs: kubectl logs -n audiobookshelf -l job-name=radigo-metadata-{{.PROGRAM}}-{{.TIMESTAMP}}"
