clusterName: homelab-cluster
talosVersion: v1.13.0
kubernetesVersion: v1.36.0
endpoint: https://192.168.0.10:6443

# Disable Talos default CNI (Flannel) to use Cilium
cniConfig:
  name: none

# Allow scheduling workloads on control plane nodes for single node cluster
allowSchedulingOnControlPlanes: true

# Cluster-wide patches
patches:
  # Disable kube-proxy (Cilium handles this with kubeProxyReplacement=true)
  - |-
    cluster:
      proxy:
        disabled: true

nodes:
  - hostname: homelab-node-01
    ipAddress: 192.168.0.10
    controlPlane: true
    installDisk: /dev/nvme0n1
    # Image Factory Schematic: https://factory.talos.dev/?arch=amd64&bootloader=auto&cmdline-set=true&extensions=-&extensions=siderolabs%2Fiscsi-tools&extensions=siderolabs%2Ftailscale&platform=metal&target=metal&version=1.12.0
    # Extensions: siderolabs/iscsi-tools (for Longhorn), siderolabs/tailscale
    talosImageURL: factory.talos.dev/installer/e2e3b54334c85fdef4d78e88f880d185e0ce0ba0c9b5861bb5daa1cd6574db9b
    patches:
      # Wipe disk on install
      - |-
        machine:
          install:
            wipe: true
      # Tailscale extension service configuration.
      #
      # TS_DEBUG_FIREWALL_MODE=iptables forces tailscaled to manage host
      # firewall rules through the iptables-nft binary instead of writing
      # nftables rules natively. The accepted values are "auto",
      # "iptables", "nftables" (see util/linuxfw/detector.go upstream).
      # The "Debug" prefix is historical and misleading — this is the
      # supported public knob, used by Tailscale's own Kubernetes
      # operator/sidecar/subnet manifests in docs/k8s/*.yaml.
      #
      # The default ("auto") picks nftables-native on Talos 1.13+ because
      # the kernel supports nf_tables, but those rules end up in a format
      # Cilium's iptables manager cannot read back via `iptables -t nat -S`
      # — the agent then logs "table 'nat' is incompatible, use 'nft' tool"
      # every 10 seconds. Pinning to iptables keeps the same Tailscale
      # connectivity (filter + nat rules are equivalent) while making both
      # Tailscale and Cilium speak the same netfilter dialect, so Cilium's
      # probe succeeds and the noise stops.
      - |-
        apiVersion: v1alpha1
        kind: ExtensionServiceConfig
        name: tailscale
        environment:
          - TS_AUTHKEY=${TAILSCALE_AUTH_KEY}
          - TS_DEBUG_FIREWALL_MODE=iptables
