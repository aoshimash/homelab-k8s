clusterName: homelab-cluster
talosVersion: v1.13.6
kubernetesVersion: v1.36.2
endpoint: https://192.168.0.10:6443

# Disable Talos default CNI (Flannel) to use Cilium
cniConfig:
  name: none

# Allow scheduling workloads on control plane nodes for single node cluster
allowSchedulingOnControlPlanes: true

# Cluster-wide patches
patches:
  # Disable kube-proxy (Cilium handles this with kubeProxyReplacement=true)
  - |-
    cluster:
      proxy:
        disabled: true

nodes:
  - hostname: homelab-node-01
    ipAddress: 192.168.0.10
    controlPlane: true
    installDisk: /dev/nvme0n1
    # Image Factory Schematic: https://factory.talos.dev/?arch=amd64&bootloader=auto&cmdline-set=true&extensions=-&extensions=siderolabs%2Fiscsi-tools&extensions=siderolabs%2Ftailscale&platform=metal&target=metal&version=1.12.0
    # Extensions: siderolabs/iscsi-tools (for Longhorn), siderolabs/tailscale
    talosImageURL: factory.talos.dev/installer/e2e3b54334c85fdef4d78e88f880d185e0ce0ba0c9b5861bb5daa1cd6574db9b
    patches:
      # Wipe disk on install
      - |-
        machine:
          install:
            wipe: true
      # Tailscale extension service configuration.
      #
      # NOTE: We tried `TS_DEBUG_FIREWALL_MODE=iptables` (PRs #209/#210) to
      # silence Cilium's "table 'nat' is incompatible, use 'nft' tool" log
      # noise by making tailscaled write rules via iptables-nft instead of
      # libnftnl. It does not work on Talos: the siderolabs/tailscale
      # extension image does not bundle the `iptables` binary, so tailscaled
      # immediately crashes on startup with:
      #
      #   router.Up: setting netfilter mode: could not create new netfilter:
      #   exec: "iptables": executable file not found in $PATH
      #
      # Tailscale connectivity (incl. talosctl/kubectl access via the tailnet
      # IP) is broken until the env var is removed. Until siderolabs/extensions
      # ships iptables in this image, leaving tailscaled in default `auto`
      # mode is the only working option. Cilium's iptables-incompatibility
      # noise is documented in docs/talos-operations.md as known/cosmetic.
      - |-
        apiVersion: v1alpha1
        kind: ExtensionServiceConfig
        name: tailscale
        environment:
          - TS_AUTHKEY=${TAILSCALE_AUTH_KEY}
