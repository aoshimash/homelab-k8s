clusterName: homelab-cluster
talosVersion: v1.12.0
kubernetesVersion: v1.35.0
endpoint: https://192.168.0.10:6443

# Disable Talos default CNI (Flannel) to use Cilium
cniConfig:
  name: none

# Allow scheduling workloads on control plane nodes for single node cluster
allowSchedulingOnControlPlanes: true

nodes:
  - hostname: homelab-node-01
    ipAddress: 192.168.0.10
    controlPlane: true
    installDisk: /dev/nvme0n1
    # Image Factory Schematic (includes Tailscale)
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/tailscale
    # Tailscale auth key configuration via machine.files
    patches:
      - |-
        machine:
          files:
            - content: |
                TS_AUTHKEY=${TAILSCALE_AUTH_KEY}
              path: /var/etc/tailscale/auth.env
              permissions: 0600
