creation_rules:
  # Talos environment variables (Tailscale auth key, etc.)
  - path_regex: infra/talos/talenv.sops.yaml
    encrypted_regex: ^(cluster|certs|secrets|trustdinfo)$
    key_groups:
      - age:
          - age1ey9qstwaadrajnmu3q2aqzazk57dywfkzf74gfp5qqmq9ph7yq9s5zpxaa
  # Talos cluster secrets (CA certs, bootstrap tokens, etc.)
  - path_regex: infra/talos/talsecret.sops.yaml
    key_groups:
      - age:
          - age1ey9qstwaadrajnmu3q2aqzazk57dywfkzf74gfp5qqmq9ph7yq9s5zpxaa
