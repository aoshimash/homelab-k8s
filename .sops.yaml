creation_rules:
  # Talos environment variables (Tailscale auth key, etc.)
  - path_regex: infra/talos/talenv.sops.yaml
    encrypted_regex: ^(cluster|certs|secrets|trustdinfo|TAILSCALE_AUTH_KEY)$
    key_groups:
      - age:
          - age1ey9qstwaadrajnmu3q2aqzazk57dywfkzf74gfp5qqmq9ph7yq9s5zpxaa
  # Talos cluster secrets (CA certs, bootstrap tokens, etc.)
  - path_regex: infra/talos/talsecret.sops.yaml
    key_groups:
      - age:
          - age1ey9qstwaadrajnmu3q2aqzazk57dywfkzf74gfp5qqmq9ph7yq9s5zpxaa
  # Kubernetes secrets (GitOps) - encrypted with SOPS + age
  - path_regex: k8s/.*\.sops\.yaml$
    encrypted_regex: "^(data|stringData)$"
    key_groups:
      - age:
          - age1ey9qstwaadrajnmu3q2aqzazk57dywfkzf74gfp5qqmq9ph7yq9s5zpxaa
  # Kubernetes secrets (GitOps) - for encryption (before .sops.yaml suffix)
  - path_regex: k8s/.*secret.*\.yaml$
    encrypted_regex: "^(data|stringData)$"
    key_groups:
      - age:
          - age1ey9qstwaadrajnmu3q2aqzazk57dywfkzf74gfp5qqmq9ph7yq9s5zpxaa
