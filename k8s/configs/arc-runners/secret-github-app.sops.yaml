apiVersion: v1
kind: Secret
metadata:
  name: arc-github-app
  namespace: arc-runners
type: Opaque
stringData:
  github_app_id: "REPLACE_WITH_YOUR_APP_ID"
  github_app_installation_id: "REPLACE_WITH_YOUR_INSTALLATION_ID"
  github_app_private_key: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_WITH_YOUR_PRIVATE_KEY_CONTENT
    -----END RSA PRIVATE KEY-----

# IMPORTANT: This file must be encrypted with SOPS before committing:
# sops -e -i k8s/configs/arc-runners/secret-github-app.sops.yaml
#
# After creating GitHub App:
# 1. Replace REPLACE_WITH_YOUR_APP_ID with actual App ID
# 2. Replace REPLACE_WITH_YOUR_INSTALLATION_ID with actual Installation ID
# 3. Replace REPLACE_WITH_YOUR_PRIVATE_KEY_CONTENT with actual private key
# 4. Encrypt with: sops -e -i k8s/configs/arc-runners/secret-github-app.sops.yaml
