apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: postgres
spec:
  instances: 1
  # vectorchord-enabled image (Postgres major 16 unchanged) so the immich
  # database can use the vchord + pgvector + earthdistance extensions that
  # Immich's Smart Search and facial recognition require. VectorChord 1.1.1
  # is within Immich's supported range (>= 0.3, < 2.0); the base
  # cloudnative-pg PG16 system image bundles pgvector in the 0.8.x line
  # (Immich requires >= 0.7, < 0.9).
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16-1.1.1
  postgresql:
    # vchord.so must be preloaded at startup for the vchord extension to load.
    shared_preload_libraries:
      - "vchord.so"
  storage:
    size: 10Gi
    storageClass: longhorn
    # Note: Longhorn recurring backups are disabled at StorageClass level
    # PostgreSQL backups are handled directly by CloudNativePG to R2
  backup:
    retentionPolicy: "7d"
    barmanObjectStore:
      destinationPath: "s3://homelab-postgres-backups/cnpg/"
      endpointURL: "https://b2142226728f160a9b43fe01f0fe5f71.r2.cloudflarestorage.com"
      s3Credentials:
        accessKeyId:
          name: postgres-r2-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: postgres-r2-credentials
          key: ACCESS_SECRET_KEY
  managed:
    roles:
      - name: vikunja
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: postgres-vikunja-user
      - name: paperless
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: postgres-paperless-user
      - name: immich
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: postgres-immich-user
