apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: postgres
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 10Gi
    storageClass: longhorn
    # Note: Longhorn recurring backups are disabled at StorageClass level
    # PostgreSQL backups are handled directly by CloudNativePG to R2
  backup:
    retentionPolicy: "7d"
    barmanObjectStore:
      destinationPath: "s3://homelab-postgres-backups/cnpg/"
      endpointURL: "REPLACED_BY_KUSTOMIZE"
      s3Credentials:
        accessKeyId:
          name: postgres-r2-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: postgres-r2-credentials
          key: ACCESS_SECRET_KEY
  managed:
    roles:
      - name: vikunja
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: postgres-vikunja-user
      - name: paperless
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: postgres-paperless-user
