apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - cluster.yaml
  - scheduledbackup.yaml
  - secret-r2-credentials.sops.yaml
  - database-vikunja.yaml
  - secret-vikunja-db.sops.yaml
  - database-paperless.yaml
  - secret-paperless-db.sops.yaml
replacements:
  - source:
      kind: Secret
      name: postgres-r2-credentials
      fieldPath: stringData.ENDPOINT_URL
    targets:
      - select:
          group: postgresql.cnpg.io
          version: v1
          kind: Cluster
          name: postgres-cluster
        fieldPaths:
          - spec.backup.barmanObjectStore.endpointURL
