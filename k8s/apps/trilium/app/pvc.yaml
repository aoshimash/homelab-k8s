apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trilium-data
  namespace: trilium
  annotations:
    recurring-job-selector.longhorn.io: '[{"name":"backup-daily","isGroup":false}]'
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
