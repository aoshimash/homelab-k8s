# Job template for updating podcast episode metadata
# This job is triggered manually via kubectl create job --from=cronjob/...
apiVersion: batch/v1
kind: CronJob
metadata:
  name: radigo-metadata
  namespace: audiobookshelf
spec:
  # This CronJob is not intended to run on schedule
  # It serves as a template for manual job creation
  schedule: "0 0 31 2 *" # Feb 31 - never runs
  suspend: true
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: radigo-metadata
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 99
            runAsGroup: 99
            fsGroup: 99
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: audiobookshelf
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: metadata-updater
              image: curlimages/curl:8.11.1
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/sh
                - /scripts/update-metadata.sh
              env:
                # Program-specific env vars (override in program overlay)
                - name: PODCAST_ID
                  value: "PLACEHOLDER"
                - name: PODCAST_DIR
                  value: "/podcasts/PLACEHOLDER"
                - name: TITLE_DATE_OFFSET
                  value: "0" # Days to subtract from file date for title (e.g., -1 for late-night shows)
                - name: PUBDATE_TIME
                  value: "03:00" # Time for pubDate in HH:MM format (broadcast end time)
                # Shared env vars from secrets
                - name: AUDIOBOOKSHELF_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: radigo-audiobookshelf-api
                      key: api_key
                - name: AUDIOBOOKSHELF_BASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: radigo-audiobookshelf-api
                      key: base_url
              volumeMounts:
                - name: podcasts
                  mountPath: /podcasts
                  readOnly: true
                - name: metadata-script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: podcasts
              persistentVolumeClaim:
                claimName: audiobookshelf-podcasts
            - name: metadata-script
              configMap:
                name: radigo-metadata-script
                defaultMode: 0755
