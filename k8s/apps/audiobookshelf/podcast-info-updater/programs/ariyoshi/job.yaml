# Manual Job for updating 有吉弘行のSUNDAY NIGHT DREAMER podcast metadata
# Run: kubectl apply then delete/recreate the job to run again
# NOTE: PODCAST_ID must be updated after creating the podcast in Audiobookshelf
apiVersion: batch/v1
kind: Job
metadata:
  name: podcast-info-updater-ariyoshi
  namespace: audiobookshelf
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 99
        runAsGroup: 99
        fsGroup: 99
      containers:
        - name: podcast-info-updater
          image: ghcr.io/aoshimash/homelab-k8s/yt-dlp-rajiko:v1.0.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command: ["/bin/sh", "/scripts/update-podcast-info.sh"]
          env:
            - name: PODCAST_ID
              value: "434221f7-db1c-422d-9860-78d9193d8e45"
            - name: PODCAST_DIR
              value: "/podcasts/ariyoshi"
            - name: AUDIOBOOKSHELF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: radigo-audiobookshelf-api
                  key: api_key
            - name: AUDIOBOOKSHELF_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: radigo-audiobookshelf-api
                  key: base_url
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: podcasts
              mountPath: /podcasts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: podcast-info-updater-script
            defaultMode: 0755
        - name: podcasts
          persistentVolumeClaim:
            claimName: audiobookshelf-podcasts
      imagePullSecrets:
        - name: ghcr-secret
