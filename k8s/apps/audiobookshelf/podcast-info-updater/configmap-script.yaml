apiVersion: v1
kind: ConfigMap
metadata:
  name: podcast-info-updater-script
  namespace: audiobookshelf
data:
  update-podcast-info.sh: |
    #!/bin/sh
    set -e

    # Logging function
    log() {
      echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*" >&2
    }

    # Environment variables
    PODCAST_ID="${PODCAST_ID:-}"
    PODCAST_DIR="${PODCAST_DIR:-}"
    AUDIOBOOKSHELF_API_KEY="${AUDIOBOOKSHELF_API_KEY:-}"
    AUDIOBOOKSHELF_BASE_URL="${AUDIOBOOKSHELF_BASE_URL:-}"

    # Validate required environment variables
    if [ -z "$PODCAST_ID" ] || [ -z "$PODCAST_DIR" ] || \
       [ -z "$AUDIOBOOKSHELF_API_KEY" ] || [ -z "$AUDIOBOOKSHELF_BASE_URL" ]; then
      log "ERROR: Missing required environment variables"
      log "DEBUG: PODCAST_ID=$PODCAST_ID, PODCAST_DIR=$PODCAST_DIR"
      exit 1
    fi

    log "INFO: Starting podcast info update for podcast=$PODCAST_ID, dir=$PODCAST_DIR"

    # Find the latest m4a file (yt-dlp format) to extract metadata from
    LATEST_FILE=$(ls -t "${PODCAST_DIR}"/*.m4a 2>/dev/null | head -1)

    if [ -z "$LATEST_FILE" ]; then
      log "ERROR: No m4a files found in $PODCAST_DIR"
      log "INFO: This script requires at least one yt-dlp downloaded file to extract metadata"
      exit 1
    fi

    log "INFO: Using file for metadata extraction: $LATEST_FILE"

    # Extract metadata from the audio file using ffprobe
    METADATA=$(ffprobe -v quiet -print_format json -show_format "$LATEST_FILE")

    if [ -z "$METADATA" ]; then
      log "ERROR: Failed to extract metadata from $LATEST_FILE"
      exit 1
    fi

    # Parse metadata fields
    # title, album, show -> podcast title
    TITLE=$(echo "$METADATA" | sed -n 's/.*"title": *"\([^"]*\)".*/\1/p' | head -1)
    # artist -> author/station
    AUTHOR=$(echo "$METADATA" | sed -n 's/.*"artist": *"\([^"]*\)".*/\1/p' | head -1)
    # genre -> genres (comma separated)
    GENRES=$(echo "$METADATA" | sed -n 's/.*"genre": *"\([^"]*\)".*/\1/p' | head -1)
    # Note: We intentionally skip description as Radiko descriptions often contain
    # problematic characters (quotes, special chars) that cause issues.
    # Library-level description is not critical and can be set manually if needed.

    log "INFO: Extracted metadata:"
    log "INFO:   Title: $TITLE"
    log "INFO:   Author: $AUTHOR"
    log "INFO:   Genres: $GENRES"

    if [ -z "$TITLE" ]; then
      log "ERROR: Could not extract title from audio file"
      exit 1
    fi

    # Try to find cover image
    # 1. First check for a separate thumbnail file (yt-dlp --write-thumbnail)
    # 2. If not found, try to extract embedded cover art from audio file
    COVER_FILE=""
    
    # Check for thumbnail file with same base name as audio file
    THUMBNAIL_FILE="${LATEST_FILE%.m4a}.jpg"
    if [ -f "$THUMBNAIL_FILE" ]; then
      COVER_FILE="$THUMBNAIL_FILE"
      log "INFO: Found thumbnail file: $COVER_FILE"
    else
      # Also check for .webp (some yt-dlp versions use this)
      THUMBNAIL_FILE="${LATEST_FILE%.m4a}.webp"
      if [ -f "$THUMBNAIL_FILE" ]; then
        COVER_FILE="$THUMBNAIL_FILE"
        log "INFO: Found thumbnail file: $COVER_FILE"
      fi
    fi

    # If no separate thumbnail, try to extract embedded cover
    if [ -z "$COVER_FILE" ]; then
      EXTRACTED_COVER="/tmp/cover_$$.jpg"
      if ffmpeg -y -i "$LATEST_FILE" -an -vcodec copy "$EXTRACTED_COVER" 2>/dev/null; then
        if [ -f "$EXTRACTED_COVER" ] && [ -s "$EXTRACTED_COVER" ]; then
          COVER_FILE="$EXTRACTED_COVER"
          log "INFO: Extracted embedded cover art"
        fi
      fi
      if [ -z "$COVER_FILE" ]; then
        log "WARNING: No cover art found (no thumbnail file or embedded art)"
      fi
    fi

    if [ -n "$COVER_FILE" ] && [ -f "$COVER_FILE" ]; then
      COVER_SIZE=$(stat -c %s "$COVER_FILE" 2>/dev/null || stat -f %z "$COVER_FILE" 2>/dev/null || echo "0")
      log "INFO: Using cover image: $COVER_FILE ($COVER_SIZE bytes)"
    fi

    # Build JSON payload for podcast update
    # Convert genres to array format (split by comma)
    GENRES_ARRAY=""
    if [ -n "$GENRES" ]; then
      GENRES_ARRAY=$(echo "$GENRES" | sed 's/, */","/g; s/^/["/; s/$/"]/')
    else
      GENRES_ARRAY="[]"
    fi

    log "INFO: Updating podcast metadata via API"

    # Update podcast metadata
    # Note: description is set to null to clear any problematic values
    UPDATE_RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X PATCH \
      -H "Authorization: Bearer ${AUDIOBOOKSHELF_API_KEY}" \
      -H "Content-Type: application/json" \
      -d "{
        \"metadata\": {
          \"title\": \"${TITLE}\",
          \"author\": \"${AUTHOR}\",
          \"description\": null,
          \"genres\": ${GENRES_ARRAY}
        }
      }" \
      "${AUDIOBOOKSHELF_BASE_URL}/api/items/${PODCAST_ID}/media")

    HTTP_CODE=$(echo "$UPDATE_RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
    RESPONSE_BODY=$(echo "$UPDATE_RESPONSE" | grep -v "HTTP_CODE:")

    if [ "$HTTP_CODE" = "200" ]; then
      log "INFO: Successfully updated podcast metadata"
    else
      log "ERROR: Failed to update podcast metadata (HTTP $HTTP_CODE): $RESPONSE_BODY"
    fi

    # Upload cover image if available
    if [ -n "$COVER_FILE" ] && [ -f "$COVER_FILE" ]; then
      log "INFO: Uploading cover image"
      
      COVER_RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
        -H "Authorization: Bearer ${AUDIOBOOKSHELF_API_KEY}" \
        -F "cover=@${COVER_FILE}" \
        "${AUDIOBOOKSHELF_BASE_URL}/api/items/${PODCAST_ID}/cover")

      COVER_HTTP_CODE=$(echo "$COVER_RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
      COVER_RESPONSE_BODY=$(echo "$COVER_RESPONSE" | grep -v "HTTP_CODE:")

      if [ "$COVER_HTTP_CODE" = "200" ]; then
        log "INFO: Successfully uploaded cover image"
      else
        log "ERROR: Failed to upload cover image (HTTP $COVER_HTTP_CODE): $COVER_RESPONSE_BODY"
      fi

      # Cleanup only temporary extracted files (not original thumbnail files)
      case "$COVER_FILE" in
        /tmp/*) rm -f "$COVER_FILE" ;;
      esac
    fi

    log "INFO: Podcast info update completed"
