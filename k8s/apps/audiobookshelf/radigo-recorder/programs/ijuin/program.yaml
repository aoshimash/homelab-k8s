# Program-specific configuration for 伊集院光 深夜の馬鹿力
# Broadcast: Monday 25:00-27:00 (Tuesday 01:00-03:00 JST)
# Station: TBS
apiVersion: batch/v1
kind: CronJob
metadata:
  name: radigo
  namespace: audiobookshelf
spec:
  # Target: Tuesday 03:05 JST -> Monday 18:05 UTC (JST = UTC+9)
  schedule: "5 18 * * 1"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: radigo
              env:
                - name: STATION_ID
                  value: "TBS"
                - name: DAY_OF_WEEK
                  value: "2" # Tuesday (broadcast day in calendar)
                - name: START_TIME
                  value: "01:00" # JST (25:00 in radiko notation)
                - name: EXPECTED_TITLE
                  value: "伊集院光"
                - name: OUTPUT_DIR
                  value: "/podcasts/ijuin"
