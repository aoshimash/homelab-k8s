# Custom record script for 有吉弘行のSUNDAY NIGHT DREAMER
# This program has a news break at 20:55-21:00, so we need to download
# two parts (20:00-20:55 and 21:00-21:55) and merge them.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ariyoshi-record-script
  namespace: audiobookshelf
data:
  entrypoint.sh: |
    #!/bin/sh
    set -e

    # Execute recording script
    /bin/bash /scripts/record.sh
  record.sh: |
    #!/bin/bash
    set -euo pipefail

    # Logging function with timestamps
    log() {
      echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*" >&2
    }

    # Environment variables (set by CronJob)
    STATION_ID="${STATION_ID:-}"
    DAY_OF_WEEK="${DAY_OF_WEEK:-}"
    START_TIME="${START_TIME:-}"
    EXPECTED_TITLE="${EXPECTED_TITLE:-}"
    OUTPUT_DIR="${OUTPUT_DIR:-}"
    # For two-part programs (news break in the middle)
    SECOND_PART_START="${SECOND_PART_START:-}"

    # Validate required environment variables
    if [[ -z "$STATION_ID" ]] || [[ -z "$DAY_OF_WEEK" ]] || [[ -z "$START_TIME" ]] || \
       [[ -z "$EXPECTED_TITLE" ]] || [[ -z "$OUTPUT_DIR" ]]; then
      log "ERROR: Missing required environment variables"
      log "ERROR: Required: STATION_ID, DAY_OF_WEEK, START_TIME, EXPECTED_TITLE, OUTPUT_DIR"
      exit 1
    fi

    log "INFO: Starting recording for station=$STATION_ID, day=$DAY_OF_WEEK, start=$START_TIME"
    if [[ -n "$SECOND_PART_START" ]]; then
      log "INFO: Two-part recording enabled, second part starts at $SECOND_PART_START"
    fi

    # Calculate target date based on DAY_OF_WEEK (must be in the PAST for timefree)
    CURRENT_DOW=$(date +%w)
    TARGET_DOW=$DAY_OF_WEEK
    CURRENT_TIME=$(date +%H%M)
    START_TIME_NUMERIC="${START_TIME//:/}"

    if [[ $CURRENT_DOW -eq $TARGET_DOW ]]; then
      if [[ "$CURRENT_TIME" -gt "$START_TIME_NUMERIC" ]]; then
        DAYS_TO_SUBTRACT=0
      else
        DAYS_TO_SUBTRACT=7
      fi
    elif [[ $CURRENT_DOW -gt $TARGET_DOW ]]; then
      DAYS_TO_SUBTRACT=$((CURRENT_DOW - TARGET_DOW))
    else
      DAYS_TO_SUBTRACT=$((7 - TARGET_DOW + CURRENT_DOW))
    fi

    if [[ $DAYS_TO_SUBTRACT -eq 0 ]]; then
      TARGET_DATE=$(date '+%Y%m%d')
    else
      TARGET_DATE=$(date -d "-${DAYS_TO_SUBTRACT} days" '+%Y%m%d')
    fi

    # Create output directory and temp directory
    mkdir -p "$OUTPUT_DIR"
    TEMP_DIR="/tmp/ariyoshi_$$"
    mkdir -p "$TEMP_DIR"

    # Download function
    download_part() {
      local part_num=$1
      local start_time=$2
      local output_file=$3
      
      local timestamp="${TARGET_DATE}${start_time//:/}00"
      local url="https://radiko.jp/#!/ts/${STATION_ID}/${timestamp}"
      
      log "INFO: Downloading part $part_num from $url"
      
      if ! yt-dlp \
        --embed-metadata \
        -N 10 \
        -o "$output_file" \
        "$url" 2>&1 | tee "/tmp/yt-dlp-part${part_num}.log"; then
        log "ERROR: Failed to download part $part_num"
        return 1
      fi
      
      log "INFO: Part $part_num downloaded successfully"
      return 0
    }

    # Download part 1 (first half)
    PART1_FILE="${TEMP_DIR}/part1.m4a"
    if ! download_part 1 "$START_TIME" "$PART1_FILE"; then
      log "ERROR: Failed to download first part"
      rm -rf "$TEMP_DIR"
      exit 1
    fi

    # If two-part recording is enabled, download and merge
    if [[ -n "$SECOND_PART_START" ]]; then
      # Download part 2 (second half)
      PART2_FILE="${TEMP_DIR}/part2.m4a"
      if ! download_part 2 "$SECOND_PART_START" "$PART2_FILE"; then
        log "ERROR: Failed to download second part"
        rm -rf "$TEMP_DIR"
        exit 1
      fi

      # Get metadata from part 1 for the merged file
      log "INFO: Extracting metadata from part 1"
      TITLE=$(ffprobe -v quiet -show_entries format_tags=title -of csv=p=0 "$PART1_FILE" | head -1)
      ARTIST=$(ffprobe -v quiet -show_entries format_tags=artist -of csv=p=0 "$PART1_FILE" | head -1)
      ALBUM=$(ffprobe -v quiet -show_entries format_tags=album -of csv=p=0 "$PART1_FILE" | head -1)
      DATE=$(ffprobe -v quiet -show_entries format_tags=date -of csv=p=0 "$PART1_FILE" | head -1)
      GENRE=$(ffprobe -v quiet -show_entries format_tags=genre -of csv=p=0 "$PART1_FILE" | head -1)
      DESCRIPTION=$(ffprobe -v quiet -show_entries format_tags=description -of csv=p=0 "$PART1_FILE" | head -1)
      
      # Format the date for filename (YYYYMMDD -> YYYY-MM-DD)
      if [[ -n "$DATE" && ${#DATE} -eq 8 ]]; then
        FORMATTED_DATE="${DATE:0:4}-${DATE:4:2}-${DATE:6:2}"
      else
        FORMATTED_DATE="$TARGET_DATE"
        FORMATTED_DATE="${FORMATTED_DATE:0:4}-${FORMATTED_DATE:4:2}-${FORMATTED_DATE:6:2}"
      fi
      
      log "INFO: Title=$TITLE, Artist=$ARTIST, Date=$DATE"

      # Create file list for ffmpeg concat
      FILELIST="${TEMP_DIR}/filelist.txt"
      echo "file '${PART1_FILE}'" > "$FILELIST"
      echo "file '${PART2_FILE}'" >> "$FILELIST"

      # Generate output filename
      if [[ -n "$TITLE" ]]; then
        OUTPUT_FILENAME="${TITLE} ${FORMATTED_DATE} [${STATION_ID}-${TARGET_DATE}${START_TIME_NUMERIC}00].m4a"
      else
        OUTPUT_FILENAME="${EXPECTED_TITLE} ${FORMATTED_DATE} [${STATION_ID}-${TARGET_DATE}${START_TIME_NUMERIC}00].m4a"
      fi
      MERGED_FILE="${OUTPUT_DIR}/${OUTPUT_FILENAME}"

      # Merge the two parts using ffmpeg concat demuxer
      log "INFO: Merging two parts into final file"
      if ! ffmpeg -y -f concat -safe 0 -i "$FILELIST" \
        -c copy \
        -metadata title="$TITLE" \
        -metadata artist="$ARTIST" \
        -metadata album="$ALBUM" \
        -metadata date="$DATE" \
        -metadata genre="$GENRE" \
        -metadata description="$DESCRIPTION" \
        "$MERGED_FILE" 2>&1 | tee /tmp/ffmpeg-merge.log; then
        log "ERROR: Failed to merge parts"
        rm -rf "$TEMP_DIR"
        exit 1
      fi

      log "INFO: Successfully merged into: $MERGED_FILE"

      # Also save thumbnail from part 1 if available
      # Try to extract embedded thumbnail
      THUMB_FILE="${OUTPUT_DIR}/${TITLE} ${FORMATTED_DATE} [${STATION_ID}-${TARGET_DATE}${START_TIME_NUMERIC}00].jpg"
      if ffmpeg -y -i "$PART1_FILE" -an -vcodec copy "$THUMB_FILE" 2>/dev/null; then
        log "INFO: Thumbnail saved: $THUMB_FILE"
      else
        log "INFO: No embedded thumbnail found"
      fi

    else
      # Single part recording - just move the file
      log "INFO: Single part recording, moving file to output directory"
      
      # Get the actual downloaded filename and move it
      DOWNLOADED_FILE=$(find "$TEMP_DIR" -name "*.m4a" -type f | head -1)
      if [[ -n "$DOWNLOADED_FILE" ]]; then
        mv "$DOWNLOADED_FILE" "$OUTPUT_DIR/"
        log "INFO: File moved to $OUTPUT_DIR/"
      else
        log "ERROR: No downloaded file found"
        rm -rf "$TEMP_DIR"
        exit 1
      fi
    fi

    # Cleanup temp directory
    rm -rf "$TEMP_DIR"

    # Verify output file was created
    if ! find "$OUTPUT_DIR" -name "*.m4a" -type f -mmin -5 2>/dev/null | grep -q .; then
      log "ERROR: Output file not found after recording"
      exit 1
    fi

    log "INFO: Recording completed successfully"
    log "INFO: Files saved to $OUTPUT_DIR"
    
    # List created files for verification
    find "$OUTPUT_DIR" -type f -mmin -5 -ls 2>/dev/null | while read -r line; do
      log "INFO: Created: $line"
    done

    log "INFO: Recording workflow completed successfully"
