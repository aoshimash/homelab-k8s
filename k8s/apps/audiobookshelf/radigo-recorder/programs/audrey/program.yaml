# Program-specific configuration for オードリーのオールナイトニッポン
# Broadcast: Saturday 25:00-27:00 (Sunday 01:00-03:00 JST)
# Station: LFR (NIPPON BROADCASTING SYSTEM)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: radigo
  namespace: audiobookshelf
spec:
  # Target: Sunday 03:05 JST -> Saturday 18:05 UTC (JST = UTC+9)
  schedule: "5 18 * * 6"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: radigo
              env:
                - name: STATION_ID
                  value: "LFR"
                - name: DAY_OF_WEEK
                  value: "0" # Sunday (broadcast day in calendar)
                - name: START_TIME
                  value: "01:00" # JST (25:00 in radiko notation)
                - name: EXPECTED_TITLE
                  value: "オードリー"
                - name: OUTPUT_DIR
                  value: "/podcasts/audrey"
