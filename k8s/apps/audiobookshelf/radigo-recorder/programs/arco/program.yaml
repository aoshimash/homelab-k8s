# Program-specific configuration for アルコ＆ピース D.C.GARAGE
# Broadcast: Wednesday 00:00-01:00 JST
# Station: TBS
apiVersion: batch/v1
kind: CronJob
metadata:
  name: radigo
  namespace: audiobookshelf
spec:
  # Target: Wednesday 01:05 JST -> Tuesday 16:05 UTC (JST = UTC+9)
  schedule: "5 16 * * 2"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: radigo
              env:
                - name: STATION_ID
                  value: "TBS"
                - name: DAY_OF_WEEK
                  value: "3" # Wednesday (broadcast day in calendar)
                - name: START_TIME
                  value: "00:00" # JST
                - name: EXPECTED_TITLE
                  value: "アルコ"
                - name: OUTPUT_DIR
                  value: "/podcasts/arco"
