apiVersion: batch/v1
kind: CronJob
metadata:
  name: radigo
  namespace: audiobookshelf
spec:
  schedule: "0 0 * * *" # Override in program overlay
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400 # Clean up after 24 hours
      template:
        metadata:
          labels:
            app: radigo
        spec:
          imagePullSecrets:
            - name: ghcr-secret
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 99
            runAsGroup: 99
            fsGroup: 99
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: audiobookshelf
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: radigo
              image: ghcr.io/aoshimash/homelab-k8s/yt-dlp-rajiko:v1.0.0
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/sh
                - /scripts/entrypoint.sh
              env:
                # Program-specific env vars (override in program overlay)
                - name: STATION_ID
                  value: "PLACEHOLDER"
                - name: DAY_OF_WEEK
                  value: "0"
                - name: START_TIME
                  value: "00:00"
                - name: EXPECTED_TITLE
                  value: "PLACEHOLDER"
                - name: OUTPUT_DIR
                  value: "/podcasts/PLACEHOLDER"
              volumeMounts:
                - name: podcasts
                  mountPath: /podcasts
                - name: output
                  mountPath: /output
                - name: record-script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 512Mi
          volumes:
            - name: podcasts
              persistentVolumeClaim:
                claimName: audiobookshelf-podcasts
            - name: output
              emptyDir: {}
            - name: record-script
              configMap:
                name: radigo-record-script
                defaultMode: 0755
