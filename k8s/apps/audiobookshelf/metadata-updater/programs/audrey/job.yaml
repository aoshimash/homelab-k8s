# Program-specific configuration for オードリーのオールナイトニッポン metadata
# Podcast ID: f259c548-c572-4015-8a32-6fd9f0606672
# Broadcast: Saturday 25:00 (BROADCAST_DOW=6=Saturday)
# Recording schedule: Sunday 03:05 JST (radigo-recorder-audrey)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: radigo-metadata
  namespace: audiobookshelf
spec:
  # Target: Sunday 03:15 JST -> Saturday 18:15 UTC (JST = UTC+9)
  schedule: "15 18 * * 6"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: metadata-updater
              env:
                - name: PODCAST_ID
                  value: "f259c548-c572-4015-8a32-6fd9f0606672"
                - name: PODCAST_DIR
                  value: "/podcasts/audrey"
                - name: BROADCAST_DOW
                  value: "6" # Saturday (title should be Saturday's date)
