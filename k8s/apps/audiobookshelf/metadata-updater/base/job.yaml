# CronJob template for updating podcast episode metadata
# Schedule is overridden by program overlays
apiVersion: batch/v1
kind: CronJob
metadata:
  name: radigo-metadata
  namespace: audiobookshelf
spec:
  schedule: "0 0 * * *" # Override in program overlay
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: radigo-metadata
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 99
            runAsGroup: 99
            fsGroup: 99
            seccompProfile:
              type: RuntimeDefault
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: audiobookshelf
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: metadata-updater
              image: curlimages/curl:8.11.1
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/sh
                - /scripts/update-metadata.sh
              env:
                # Program-specific env vars (override in program overlay)
                - name: PODCAST_ID
                  value: "PLACEHOLDER"
                - name: PODCAST_DIR
                  value: "/podcasts/PLACEHOLDER"
                - name: BROADCAST_DOW
                  value: "6" # Broadcast day of week (0=Sun, 1=Mon, ..., 6=Sat)
                - name: PUBDATE_TIME
                  value: "03:00" # Time for pubDate in HH:MM format (broadcast end time)
                # Shared env vars from secrets
                - name: AUDIOBOOKSHELF_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: radigo-audiobookshelf-api
                      key: api_key
                - name: AUDIOBOOKSHELF_BASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: radigo-audiobookshelf-api
                      key: base_url
              volumeMounts:
                - name: podcasts
                  mountPath: /podcasts
                  readOnly: true
                - name: metadata-script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: podcasts
              persistentVolumeClaim:
                claimName: audiobookshelf-podcasts
            - name: metadata-script
              configMap:
                name: radigo-metadata-script
                defaultMode: 0755
