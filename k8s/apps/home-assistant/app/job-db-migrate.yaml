apiVersion: batch/v1
kind: Job
metadata:
  name: home-assistant-db-migrate
  namespace: home-assistant
  annotations:
    # This job is temporary and should be removed after successful migration
    # Remove from kustomization.yaml after 24h observation period
    description: "One-time migration job to copy SQLite DB to PostgreSQL using pgloader"
spec:
  # Prevent automatic retries - migration should be idempotent but manual control is safer
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400 # Clean up after 24 hours
  template:
    metadata:
      labels:
        app: home-assistant-migration
    spec:
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pgloader
          image: dimitri/pgloader:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Starting SQLite to PostgreSQL migration..."
              echo "Source: /mnt/sqlite/home-assistant_v2.db"
              echo "Target: $DB_URL"

              # Create pgloader command file
              # Note: SQLite migration has limited WITH options compared to PostgreSQL/MySQL
              # Parse DB_URL to extract components for pgloader
              # URL format: postgresql://user:password@host:port/database
              # Remove scheme first to simplify parsing
              URL_WITHOUT_SCHEME=$(echo "$DB_URL" | sed 's|^[^:]*://||')
              # Extract user (before first :)
              DB_USER=$(echo "$URL_WITHOUT_SCHEME" | sed -n 's|^\([^:]*\):.*|\1|p')
              # Extract password (between first : and @)
              DB_PASS=$(echo "$URL_WITHOUT_SCHEME" | sed -n 's|^[^:]*:\([^@]*\)@.*|\1|p')
              # Extract host (between @ and :port)
              DB_HOST=$(echo "$URL_WITHOUT_SCHEME" | sed -n 's|.*@\([^:]*\):.*|\1|p')
              # Extract port (between host: and /)
              DB_PORT=$(echo "$URL_WITHOUT_SCHEME" | sed -n 's|.*:\([0-9]*\)/.*|\1|p')
              # Extract database name (after last /)
              DB_NAME=$(echo "$URL_WITHOUT_SCHEME" | sed -n 's|.*/\([^?]*\).*|\1|p')
              
              echo "Parsed connection parameters:"
              echo "  Host: $DB_HOST"
              echo "  Port: $DB_PORT"
              echo "  Database: $DB_NAME"
              echo "  User: $DB_USER"
              
              # Create pgloader command file with explicit connection parameters
              cat > /tmp/migrate.load <<'MIGRATE_EOF'
              LOAD DATABASE
                FROM sqlite:///mnt/sqlite/home-assistant_v2.db
                INTO pgsql://DB_USER_PLACEHOLDER:DB_PASS_PLACEHOLDER@DB_HOST_PLACEHOLDER:DB_PORT_PLACEHOLDER/DB_NAME_PLACEHOLDER
              WITH
                include drop,
                create tables,
                create indexes,
                reset sequences,
                disable triggers
              SET
                work_mem to '256MB',
                maintenance_work_mem to '512MB'
              BEFORE LOAD DO
                $$ CREATE EXTENSION IF NOT EXISTS "uuid-ossp"; $$,
                $$ CREATE EXTENSION IF NOT EXISTS "pg_trgm"; $$
              ;
              MIGRATE_EOF
              # Replace placeholders with actual values
              sed -i "s|DB_USER_PLACEHOLDER|$DB_USER|g" /tmp/migrate.load
              sed -i "s|DB_PASS_PLACEHOLDER|$DB_PASS|g" /tmp/migrate.load
              sed -i "s|DB_HOST_PLACEHOLDER|$DB_HOST|g" /tmp/migrate.load
              sed -i "s|DB_PORT_PLACEHOLDER|$DB_PORT|g" /tmp/migrate.load
              sed -i "s|DB_NAME_PLACEHOLDER|$DB_NAME|g" /tmp/migrate.load

              echo "Migration script created. Executing pgloader..."
              pgloader /tmp/migrate.load

              echo "Migration completed successfully!"
              echo "Verifying data..."

              # Basic verification queries
              psql "$DB_URL" -c "SELECT COUNT(*) as total_events FROM events;" || true
              psql "$DB_URL" -c "SELECT COUNT(*) as total_states FROM states;" || true
              psql "$DB_URL" -c "SELECT MAX(created) as latest_event FROM events;" || true

              echo "Verification complete."
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: home-assistant-db-url
                  key: DB_URL
          volumeMounts:
            - name: sqlite-db
              mountPath: /mnt/sqlite
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
      volumes:
        - name: sqlite-db
          persistentVolumeClaim:
            claimName: home-assistant-config
            readOnly: true
