apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: homelab-node-01
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:2024.12
          ports:
            - containerPort: 8123
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /config
            - name: automations
              mountPath: /config/automations.yaml
              subPath: automations.yaml
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: 8123
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 10
        - name: matter-server
          image: ghcr.io/home-assistant-libs/python-matter-server:stable
          args:
            - --storage-path
            - /data
            - --paa-root-cert-dir
            - /data/credentials
            - --primary-interface
            - enp1s0f1
          env:
            # Force CHIP SDK to only use the physical interface
            - name: CHIP_MDNS_INTERFACE
              value: "enp1s0f1"
            - name: CHIP_INET_INTERFACE
              value: "enp1s0f1"
          ports:
            - containerPort: 5580
          securityContext:
            privileged: true
          volumeMounts:
            - name: matter-data
              mountPath: /data
            - name: dbus
              mountPath: /var/run/dbus
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-config
        - name: automations
          configMap:
            name: home-assistant-automations
        - name: matter-data
          emptyDir: {}
        - name: dbus
          hostPath:
            path: /var/run/dbus
