apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: private-apps
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./k8s/apps/audiobookshelf
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: homelab-k8s-private
    namespace: flux-system
  dependsOn:
    - name: apps
