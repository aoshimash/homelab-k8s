apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-crds
  namespace: flux-system
spec:
  interval: 10m0s
  # CRDs are installed in their own Kustomization that `infrastructure`
  # depends on. A HelmRelease-installed CRD and a CR of that CRD cannot live in
  # the same Kustomization: the CR fails its dry-run ("no matches for kind")
  # before the HelmRelease is applied, so the whole apply aborts and the CRD is
  # never installed. `wait: true` blocks until the CRD HelmRelease is Ready
  # (CRDs present) before `infrastructure` (which contains PrometheusRules) runs.
  path: ./k8s/infrastructure/prometheus-operator-crds
  prune: true
  wait: true
  timeout: 5m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
