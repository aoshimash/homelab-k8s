apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # NOTE: prometheus-operator-crds is intentionally NOT listed here. It is
  # applied by the separate `infra-crds` Flux Kustomization that this layer
  # depends on, so the PrometheusRule CRD exists before the PrometheusRule
  # resources in grafana-alloy/ are applied. See k8s/flux/infra-crds-kustomization.yaml.
  - cilium/
  - longhorn/
  - tailscale/
  - grafana-alloy/
  - kube-state-metrics/
  - metrics-server/
  - cloudnative-pg/
  - actions-runner-controller/
  - reloader/
