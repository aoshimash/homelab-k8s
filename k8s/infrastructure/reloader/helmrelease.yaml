apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 10m0s
  chart:
    spec:
      chart: reloader
      version: 2.2.11
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: flux-system
  releaseName: reloader
