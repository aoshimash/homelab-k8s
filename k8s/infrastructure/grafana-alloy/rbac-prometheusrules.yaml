# Grant Grafana Alloy read access to PrometheusRule resources so the
# mimir.rules.kubernetes component can discover them and sync them to the
# Grafana Cloud ruler. The grafana/alloy chart's default ClusterRole only
# covers node/pod/service discovery, not the prometheus-operator CRDs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: grafana-alloy-prometheusrules
  labels:
    app.kubernetes.io/name: grafana-alloy
rules:
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - prometheusrules
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-alloy-prometheusrules
  labels:
    app.kubernetes.io/name: grafana-alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: grafana-alloy-prometheusrules
subjects:
  - kind: ServiceAccount
    name: grafana-alloy
    namespace: monitoring
