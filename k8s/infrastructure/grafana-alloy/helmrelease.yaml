apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-alloy
  namespace: monitoring
spec:
  interval: 10m0s
  chart:
    spec:
      chart: alloy
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      # Version not pinned - will use latest from repository
      # Consider pinning version after initial deployment for stability
  releaseName: grafana-alloy
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controller:
      type: daemonset
    alloy:
      configMap:
        content: |-
          // =============================================================================
          // LOGGING
          // =============================================================================
          logging {
            // "warn" instead of the "info" default: at info Alloy logs
            // "opened log stream" for every collected target, which made
            // its own log the cluster's largest Loki ingestion source
            // (~30k lines/day, issue #217). Revert to "info" temporarily
            // when debugging Alloy itself.
            level  = "warn"
            format = "logfmt"
          }

          // =============================================================================
          // DISCOVERY
          // =============================================================================

          // Discover Kubernetes nodes
          discovery.kubernetes "nodes" {
            role = "node"
          }

          // Discover Kubernetes pods
          discovery.kubernetes "pods" {
            role = "pod"
          }

          // Discover kube-state-metrics service
          discovery.kubernetes "kube_state_metrics" {
            role = "service"
            namespaces {
              names = ["monitoring"]
            }
            selectors {
              role = "service"
              label = "app.kubernetes.io/name=kube-state-metrics"
            }
          }

          // Discover Longhorn manager pods (backup metrics on :9500)
          discovery.kubernetes "longhorn_manager" {
            role = "pod"
            namespaces {
              names = ["longhorn-system"]
            }
            selectors {
              role  = "pod"
              label = "app=longhorn-manager"
            }
          }

          // Keep only the :9500 metrics port; carry the namespace label
          discovery.relabel "longhorn_manager" {
            targets = discovery.kubernetes.longhorn_manager.targets

            rule {
              source_labels = ["__meta_kubernetes_pod_container_port_number"]
              regex         = "9500"
              action        = "keep"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
          }

          // Discover CloudNativePG instance pods (backup metrics on :9187)
          discovery.kubernetes "cnpg_instances" {
            role = "pod"
            namespaces {
              names = ["postgres"]
            }
            selectors {
              role  = "pod"
              label = "cnpg.io/cluster=postgres-cluster"
            }
          }

          // Keep only the :9187 metrics port; carry namespace/cluster labels
          discovery.relabel "cnpg_instances" {
            targets = discovery.kubernetes.cnpg_instances.targets

            rule {
              source_labels = ["__meta_kubernetes_pod_container_port_number"]
              regex         = "9187"
              action        = "keep"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            // Use a dedicated label, not "cluster": the shared add_cluster
            // relabel below overwrites "cluster" with "homelab" on every metric.
            rule {
              source_labels = ["__meta_kubernetes_pod_label_cnpg_io_cluster"]
              target_label  = "cnpg_cluster"
            }
          }

          // =============================================================================
          // METRICS COLLECTION
          // =============================================================================

          // Scrape kubelet metrics (node-level)
          prometheus.scrape "kubelet" {
            targets = discovery.kubernetes.nodes.targets
            
            job_name = "kubelet"
            scheme   = "https"
            
            tls_config {
              ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              insecure_skip_verify = true
            }
            bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
            
            forward_to = [prometheus.relabel.kubelet_filter.receiver]
          }

          // Keep only core kubelet metrics
          prometheus.relabel "kubelet_filter" {
            forward_to = [prometheus.relabel.add_cluster.receiver]

            rule {
              source_labels = ["__name__"]
              regex = "kubelet_running_pods|kubelet_running_containers|kubelet_node_name|kubelet_volume_stats_available_bytes|kubelet_volume_stats_capacity_bytes|kubelet_volume_stats_used_bytes|up"
              action = "keep"
            }
          }

          // Scrape cadvisor metrics (container-level)
          prometheus.scrape "cadvisor" {
            targets = discovery.kubernetes.nodes.targets
            
            job_name     = "cadvisor"
            scheme       = "https"
            metrics_path = "/metrics/cadvisor"
            
            tls_config {
              ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              insecure_skip_verify = true
            }
            bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
            
            forward_to = [prometheus.relabel.cadvisor_filter.receiver]
          }

          // Keep only core cadvisor metrics
          prometheus.relabel "cadvisor_filter" {
            forward_to = [prometheus.relabel.add_cluster.receiver]

            rule {
              source_labels = ["__name__"]
              regex = "container_cpu_usage_seconds_total|container_cpu_cfs_throttled_seconds_total|container_memory_working_set_bytes|container_memory_usage_bytes|container_network_receive_bytes_total|container_network_transmit_bytes_total|container_fs_reads_bytes_total|container_fs_writes_bytes_total|up"
              action = "keep"
            }
          }

          // Scrape kube-state-metrics
          prometheus.scrape "kube_state_metrics" {
            targets    = discovery.kubernetes.kube_state_metrics.targets
            job_name   = "kube-state-metrics"
            forward_to = [prometheus.relabel.add_cluster.receiver]
          }

          // Scrape Longhorn manager (backup + volume health metrics)
          prometheus.scrape "longhorn" {
            targets    = discovery.relabel.longhorn_manager.output
            job_name   = "longhorn-manager"
            forward_to = [prometheus.relabel.longhorn_filter.receiver]
          }

          // Keep only backup-relevant Longhorn metrics
          prometheus.relabel "longhorn_filter" {
            forward_to = [prometheus.relabel.add_cluster.receiver]

            rule {
              source_labels = ["__name__"]
              regex  = "longhorn_backup_state|longhorn_volume_last_backup_at|longhorn_volume_robustness|up"
              action = "keep"
            }
          }

          // Scrape CloudNativePG instances (backup metrics)
          prometheus.scrape "cnpg" {
            targets    = discovery.relabel.cnpg_instances.output
            job_name   = "cloudnative-pg"
            forward_to = [prometheus.relabel.cnpg_filter.receiver]
          }

          // Keep only backup-relevant CloudNativePG metrics
          prometheus.relabel "cnpg_filter" {
            forward_to = [prometheus.relabel.add_cluster.receiver]

            rule {
              source_labels = ["__name__"]
              regex  = "cnpg_collector_last_available_backup_timestamp|cnpg_collector_last_failed_backup_timestamp|cnpg_collector_first_recoverability_point|cnpg_collector_up|up"
              action = "keep"
            }
          }

          // Add cluster label to all metrics
          prometheus.relabel "add_cluster" {
            forward_to = [prometheus.remote_write.grafana_cloud.receiver]
            
            rule {
              target_label = "cluster"
              replacement  = "homelab"
            }
          }

          // Remote write to Grafana Cloud Prometheus
          prometheus.remote_write "grafana_cloud" {
            endpoint {
              url = env("GRAFANA_CLOUD_PROMETHEUS_URL")
              
              basic_auth {
                username = env("GRAFANA_CLOUD_USER")
                password = env("GRAFANA_CLOUD_API_KEY")
              }
            }
            
            external_labels = {
              cluster = "homelab",
            }
          }

          // =============================================================================
          // ALERTING RULES
          // =============================================================================

          // Sync in-cluster PrometheusRule resources to the Grafana Cloud Mimir
          // ruler. Rules are evaluated in Grafana Cloud against the
          // remote-written metrics above; fired alerts are routed to Slack by
          // the Mimir Alertmanager config (see grafana-cloud/alertmanager.yaml).
          // GRAFANA_CLOUD_RULER_URL is optional: if unset, this component is
          // inactive and the rest of Alloy (metrics/logs) keeps running.
          mimir.rules.kubernetes "grafana_cloud" {
            address = env("GRAFANA_CLOUD_RULER_URL")

            basic_auth {
              username = env("GRAFANA_CLOUD_USER")
              password = env("GRAFANA_CLOUD_API_KEY")
            }
          }

          // =============================================================================
          // LOG COLLECTION
          // =============================================================================

          // Collect logs from all pods
          loki.source.kubernetes "pods" {
            targets    = discovery.kubernetes.pods.targets
            forward_to = [loki.process.add_labels.receiver]
          }

          // Process and add labels
          loki.process "add_labels" {
            forward_to = [loki.write.grafana_cloud.receiver]

            // Drop the Cilium iptables/nftables incompatibility line that
            // fires from `module=agent.datapath.iptables` every 10 seconds
            // on Talos 1.13. It is cosmetic — pod-to-external SNAT runs in
            // eBPF (bpf.masquerade=true) and Service routing runs in eBPF
            // (kubeProxyReplacement=true), so the iptables manager's failed
            // probe has no effect on the dataplane. The line is dropped
            // here, before forwarding to Grafana Cloud Loki, so it does not
            // count toward ingestion billing.
            //
            // Alloy emits loki_process_dropped_lines_total{reason="..."}
            // for every drop, so the count remains observable in
            // Grafana Cloud Prometheus even though the lines themselves
            // are not stored. See docs/incidents/2026-05-04-... for the
            // full root cause analysis; remove this stage once upstream
            // Cilium ships an iptables-free mode (cilium/cilium#12879).
            stage.drop {
              expression          = "iptables.*\\(nf_tables\\):.*table.*is incompatible"
              drop_counter_reason = "cilium_iptables_nft_incompat"
            }

            // Drop Cilium's "Fallback node addresses updated" line from
            // `module=agent.datapath.node-address`. It fires on every
            // reconcile of the node-address controller (every few seconds
            // on this cluster, driven by routine Service/Route table
            // churn), not only when the fallback address actually changes:
            // the controller computes an `updated` bool for exactly this
            // purpose (pkg/datapath/tables/node_address.go, cilium 1.19.5)
            // but discards it before the log call, so the Info log has no
            // change-detection guard. This accounts for ~90% of agent log
            // volume on this single-node cluster while the reported
            // addresses never actually change. Cosmetic only — no dataplane
            // impact, and there is no Helm chart knob to gate this specific
            // message (raising the whole agent's log level would also
            // silence unrelated diagnostics).
            //
            // Remove this stage if upstream Cilium starts gating the log on
            // the `updated` result.
            stage.drop {
              expression          = "Fallback node addresses updated"
              drop_counter_reason = "cilium_fallback_node_address_noise"
            }

            stage.static_labels {
              values = {
                cluster = "homelab",
              }
            }
          }

          // Write logs to Grafana Cloud Loki
          loki.write "grafana_cloud" {
            endpoint {
              url = env("GRAFANA_CLOUD_LOKI_URL")
              
              basic_auth {
                username = env("GRAFANA_CLOUD_LOKI_USER")
                password = env("GRAFANA_CLOUD_API_KEY")
              }
            }
            
            external_labels = {
              cluster = "homelab",
            }
          }
      extraEnv:
        - name: GRAFANA_CLOUD_PROMETHEUS_URL
          valueFrom:
            secretKeyRef:
              name: grafana-cloud-credentials
              key: GRAFANA_CLOUD_PROMETHEUS_URL
        - name: GRAFANA_CLOUD_LOKI_URL
          valueFrom:
            secretKeyRef:
              name: grafana-cloud-credentials
              key: GRAFANA_CLOUD_LOKI_URL
        - name: GRAFANA_CLOUD_USER
          valueFrom:
            secretKeyRef:
              name: grafana-cloud-credentials
              key: GRAFANA_CLOUD_USER
        - name: GRAFANA_CLOUD_API_KEY
          valueFrom:
            secretKeyRef:
              name: grafana-cloud-credentials
              key: GRAFANA_CLOUD_API_KEY
        - name: GRAFANA_CLOUD_LOKI_USER
          valueFrom:
            secretKeyRef:
              name: grafana-cloud-credentials
              key: GRAFANA_CLOUD_LOKI_USER
        # Grafana Cloud Mimir ruler base URL (host of GRAFANA_CLOUD_PROMETHEUS_URL
        # without the /api/prom/push path). Marked optional so Alloy still starts
        # before this key is added to the secret; until then, rule sync is off.
        - name: GRAFANA_CLOUD_RULER_URL
          valueFrom:
            secretKeyRef:
              name: grafana-cloud-credentials
              key: GRAFANA_CLOUD_RULER_URL
              optional: true
