apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator-crds
  namespace: flux-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: prometheus-operator-crds
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      # Pinned to avoid automatic upgrades; managed by Renovate.
      # Installs the prometheus-operator CRDs (incl. PrometheusRule) only —
      # no operator/controller. PrometheusRule resources are synced to the
      # Grafana Cloud ruler by Grafana Alloy (mimir.rules.kubernetes).
      version: 30.0.0
  releaseName: prometheus-operator-crds
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
