apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-daily
  namespace: longhorn-system
spec:
  # Run daily at 18:30 UTC (03:30 JST), 30 minutes after the CNPG daily
  # database backup (18:00 UTC) so PVC backups never predate the paired
  # database backup (see docs/cloudnative-pg.md, "Backup Configuration Notes")
  cron: "30 18 * * *"
  task: backup
  # Number of backups to retain
  retain: 30
  # Number of jobs to run concurrently
  concurrency: 1
  # Apply to volumes in the "default" group
  groups:
    - default
  labels:
    recurring-job: backup-daily
