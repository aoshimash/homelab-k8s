apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: longhorn
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      # Pinned to avoid automatic upgrades; adjust as needed after validating against the repo's upgrade policy.
      version: 1.6.2
  releaseName: longhorn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    defaultSettings:
      # Single-node cluster default (clarified in spec): replicas must be 1.
      defaultReplicaCount: 1

