apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: longhorn
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      # Pinned to avoid automatic upgrades; adjust as needed after validating against the repo's upgrade policy.
      version: v1.7.3
  releaseName: longhorn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    defaultSettings:
      # Single-node cluster default (clarified in spec): replicas must be 1.
      defaultReplicaCount: 1
      # Cloudflare R2 (S3-compatible) backup target.
      # NOTE: Replace placeholders before relying on backups.
      backupTarget: s3://homelab-longhorn-backups@auto/longhorn/
      backupTargetCredentialSecret: longhorn-r2-credentials
    # StorageClass settings for single-node cluster.
    persistence:
      defaultClassReplicaCount: 1
    # Default recurring jobs applied by Longhorn.
    # NOTE: Validate the exact behavior in your Longhorn version/UI (e.g., group assignment).
    defaultRecurringJobs:
      - name: backup-daily
        task: backup
        cron: "0 2 * * *"
        retain: 30
        concurrency: 1
        groups:
          - default
