apiVersion: v1
kind: Pod
metadata:
  name: longhorn-smoke
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          set -eu
          echo "hello-$(date +%s)" | tee /data/hello.txt
          sync
          cat /data/hello.txt
          echo "ok"
          sleep 3600
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: longhorn-smoke-pvc

