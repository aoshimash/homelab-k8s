apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
  annotations:
    migration-warning: "Values are provisional and must be verified against the running cluster (tasks T009/T010) before deployment to ensure zero-downtime migration"
spec:
  interval: 10m0s
  chart:
    spec:
      chart: cilium
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      version: 1.19.3
  releaseName: cilium
  # WARNING: These values are based on documentation and may not match the actual running cluster.
  # Before deploying, T009 and T010 must be completed to capture and verify the current Helm release
  # values from the running cluster to ensure zero-downtime migration.
  values:
    ipam:
      mode: kubernetes
    kubeProxyReplacement: true
    # Use eBPF for pod-to-external SNAT. Required on Talos 1.13+ because the
    # bundled iptables binary uses the nf_tables backend and cannot manage the
    # kernel's nat table state, breaking iptables-based masquerade and pod
    # egress entirely. With bpf.masquerade=true Cilium does SNAT in eBPF and
    # bypasses iptables for pod egress.
    #
    # Cilium's agent will still log a "table 'nat' is incompatible, use 'nft'
    # tool" error every 10s as its iptables manager probes the nat table. This
    # is cosmetic noise — the dataplane (eBPF SNAT, eBPF Service routing) is
    # unaffected. We tried `installIptablesRules: false` to silence it but the
    # 1.19.3 chart silently drops the value (see PR #206 / #208). Live with
    # the noise until upstream Cilium ships a real nf_tables-only mode.
    bpf:
      masquerade: true
    loadBalancer:
      acceleration: disabled
    socketLB:
      hostNamespaceOnly: true
    # Explicitly set MTU to prevent Cilium from using tailscale0's lower MTU (1280).
    # Without this, Cilium auto-detects MTU from all devices including tailscale0,
    # which causes significant bandwidth degradation for downloads.
    # See: https://tailscale.com/kb/1236/kubernetes-operator#cilium-in-kube-proxy-replacement-mode
    # Note: Cilium Helm chart uses uppercase 'MTU' key
    MTU: 1450
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    k8sServiceHost: localhost
    k8sServicePort: 7445
    operator:
      replicas: 1
