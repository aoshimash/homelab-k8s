# Contract: GitHub App Secret (TEMPLATE - DO NOT USE DIRECTLY)
# This file shows the expected structure. Actual secret must be SOPS-encrypted.

apiVersion: v1
kind: Secret
metadata:
  name: arc-github-app
  namespace: arc-runners
type: Opaque
stringData:
  # GitHub App ID (numeric)
  github_app_id: "123456"
  
  # Installation ID for the organization
  github_app_installation_id: "654321"
  
  # Private key in PEM format
  github_app_private_key: |
    -----BEGIN RSA PRIVATE KEY-----
    MIIEpAIBAAKCAQEA...
    ...
    -----END RSA PRIVATE KEY-----

# IMPORTANT: In production, this file should be:
# 1. Named: secret-github-app.sops.yaml
# 2. Encrypted with: sops -e -i secret-github-app.sops.yaml
# 3. Never committed in plaintext
